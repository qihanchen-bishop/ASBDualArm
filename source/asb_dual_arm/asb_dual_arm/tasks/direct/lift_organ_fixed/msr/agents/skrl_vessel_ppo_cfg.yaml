
# skrl PPO configuration for Vessel Semantic Segmentation Task
# Single robot with IK-based end-effector control

seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:  # see gaussian_model parameters
    class: GaussianMixin
    clip_actions: True
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 0.5
    initial_log_std: -1.0  # Start with smaller action variance for IK control
    network:
      - name: rgb_encoder
        input: permute(OBSERVATIONS["rgb_image"], (0, 3, 1, 2))
        layers:
          - conv2d: {out_channels: 32, kernel_size: 8, stride: 4, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 3, stride: 1, padding: 0}
          - flatten
          - linear: 256
          - linear: 32
        activations: [relu, relu, relu, null, elu, elu]
      - name: pose_encoder
        input: OBSERVATIONS["ee_1_pose"]
        layers: [32, 16]
        activations: elu
      - name: net
        input: concatenate([rgb_encoder, pose_encoder])
        layers: [128, 64]
        activations: elu
    output: ACTIONS
  value:  # see deterministic_model parameters
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: rgb_encoder
        input: permute(OBSERVATIONS["rgb_image"], (0, 3, 1, 2))
        layers:
          - conv2d: {out_channels: 32, kernel_size: 8, stride: 4, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 4, stride: 2, padding: 0}
          - conv2d: {out_channels: 64, kernel_size: 3, stride: 1, padding: 0}
          - flatten
          - linear: 256
          - linear: 32
        activations: [relu, relu, relu, null, elu, elu]
      - name: pose_encoder
        input: OBSERVATIONS["ee_1_pose"]
        layers: [32, 16]
        activations: elu
      - name: net
        input: concatenate([rgb_encoder, pose_encoder])
        layers: [128, 64]
        activations: elu
    output: ONE


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined (same as agent:rollouts)


# PPO agent configuration (field names are from PPO_DEFAULT_CONFIG)
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPO
  rollouts: 32  # More rollout steps for better exploration
  learning_epochs: 4
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04  # Smaller learning rate for more stable training
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.05
    max_lr: 1.0e-03
  state_preprocessor: null
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.005  # Avoid policy std runaway while preserving exploration
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: False
  # logging and checkpoint
  experiment:
    directory: "vessel_semantic"
    experiment_name: ""
    write_interval: 320
    checkpoint_interval: auto

# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 100000  # More timesteps for semantic task
  environment_info: log
